services:
  - type: web
    name: coffich-backend
    runtime: python
    rootDir: django_backend
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --no-input
    startCommand: gunicorn coffich.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: localhost,127.0.0.1
      - key: DJANGO_CORS_ALLOW_ALL_ORIGINS
        value: "1"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://coffich-frontend.onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: SMSTO_API_KEY
        sync: false
      - key: SMSTO_API_TOKEN
        sync: false
      - key: SMSTO_SENDER_ID
        value: SMSto
      - key: SMSTO_BASE_URL
        value: https://api.sms.to
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_USE_SYSTEM_PROXY
        value: "0"
      - key: BUKHARA_SERVICE_RADIUS_KM
        value: "45"

  - type: static_site
    name: coffich-frontend
    rootDir: frontend
    plan: starter
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    pullRequestPreviewsEnabled: false
    envVars:
      - key: REACT_APP_API_URL
        value: https://coffich-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
